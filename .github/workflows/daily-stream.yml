name: Daily Build Stream

on:
  schedule:
    - cron: '55 23 * * *' # 11:55 PM UTC daily
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  prepare-stream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed for git log

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate stream data
        run: node scripts/prepare-stream-data.js

      - name: Generate draft article
        run: node scripts/write-stream-article.js

      - name: Commit and push if changed
        run: |
          git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard labnotes/build-stream/)" ] && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add labnotes/build-stream/
          git commit -m "chore(build-stream): auto-generate daily stream data"
          git push
