name: Update Activity Feed

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: node scripts/generate-feed.js
        env:
          GITHUB_TOKEN: ${{ secrets.FEED_GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git diff --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --ignore-missing index.html v1.html v2.html v3.html v4.html v5.html v6.html
          git commit -m "chore: update activity feed from GitHub commits"
          git push
